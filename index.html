<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Baduk Go - IA Mestre</title>
    
    <!-- Vinculação do CSS que criamos anteriormente -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>BADUK GO</h1>
        </header>

        <!-- Painel de Status: Indica a vez do jogador e mensagens da IA -->
        <div id="status">Iniciando jogo...</div>

        <!-- Painel de Pontuação (Opcional, mas dá um ar profissional) -->
        <div style="margin-bottom: 10px; font-weight: bold; color: #f39c12;">
            Pretas (Você): <span id="black-score">0</span> | 
            Brancas (IA): <span id="white-score">0</span>
        </div>

        <!-- O Tabuleiro: Onde o JS irá desenhar as linhas e pedras -->
        <!-- O tamanho 600x600 é ideal para um tabuleiro 19x19 -->
        <canvas id="goBoard" width="600" height="600"></canvas>

        <!-- Área de Controles -->
        <div class="controls">
            <button id="btn-pass" onclick="passTurn()">Passar Vez</button>
            <button id="btn-reset" class="reset" onclick="resetGame()">Reiniciar Jogo</button>
        </div>

        <!-- Rodapé com informações extras -->
        <footer class="footer-info">
            <p>IA Nível Mestre (MCTS Algorithm) rodando via Web Worker</p>
            <p>Clique nas interseções para jogar.</p>
        </footer>
    </div>

    <!-- 
        IMPORTANTE: 
        O arquivo game.js conterá a lógica principal. 
        O arquivo ai_mestre.js será chamado internamente pelo game.js como um Worker.
    -->
    <script src="game.js"></script>

</body>
</html>
