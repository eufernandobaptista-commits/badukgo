<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Baduk Go AI - Teste de Tabuleiro</title>
    <style>
        /* O CSS que você passou está aqui */
        body { 
            background-color: #2c3e50; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { text-align: center; }
        /* O segredo: o Canvas tem a cor de madeira, o JS desenha as linhas */
        canvas { 
            background-color: #deb887; 
            border: 2px solid #5d4037; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            cursor: pointer; 
        }
        .controls { margin-top: 20px; }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            background: #ecf0f1; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold;
        }
        #status { font-size: 20px; margin-bottom: 10px; color: #f1c40f; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Baduk Go</h1>
        <div id="status">Sua vez (Pretas)</div>
        
        <!-- Este elemento é o tabuleiro. O JS desenha dentro dele -->
        <canvas id="goBoard" width="600" height="600"></canvas>
        
        <div class="controls">
            <button onclick="resetGame()">Reiniciar</button>
            <button onclick="passTurn()">Passar Vez</button>
        </div>
    </div>

    <script>
        // O JAVASCRIPT QUE VOCÊ PASSOU ESTÁ AQUI
        const canvas = document.getElementById('goBoard');
        const ctx = canvas.getContext('2d');
        const size = 19; 
        const padding = 30;
        const cellSize = (canvas.width - padding * 2) / (size - 1);

        let board = Array(size).fill().map(() => Array(size).fill(0)); 
        let currentPlayer = 1;

        // ESTA FUNÇÃO É QUE "CRIA" O TABULEIRO VISUALMENTE
        function drawBoard() {
            // Limpa o canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Define a cor das linhas
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            
            // Desenha as linhas verticais e horizontais
            for (let i = 0; i < size; i++) {
                // Linhas Verticais
                ctx.beginPath();
                ctx.moveTo(padding + i * cellSize, padding);
                ctx.lineTo(padding + i * cellSize, canvas.height - padding);
                ctx.stroke();

                // Linhas Horizontais
                ctx.beginPath();
                ctx.moveTo(padding, padding + i * cellSize);
                ctx.lineTo(canvas.width - padding, padding + i * cellSize);
                ctx.stroke();
            }

            // Desenha os "Hoshi" (pontos de referência tradicionais do Go)
            const hoshiPoints = [3, 9, 15];
            hoshiPoints.forEach(r => {
                hoshiPoints.forEach(c => {
                    ctx.beginPath();
                    ctx.arc(padding + c * cellSize, padding + r * cellSize, 4, 0, Math.PI * 2);
                    ctx.fillStyle = "#000";
                    ctx.fill();
                });
            });

            // Desenha as pedras
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] !== 0) {
                        ctx.beginPath();
                        ctx.arc(padding + c * cellSize, padding + r * cellSize, cellSize / 2.2, 0, Math.PI * 2);
                        ctx.fillStyle = board[r][c] === 1 ? '#000' : '#fff';
                        ctx.fill();
                        ctx.strokeStyle = board[r][c] === 1 ? '#fff' : '#000';
                        ctx.stroke();
                    }
                }
            }
        }

        canvas.addEventListener('click', (e) => {
            if (currentPlayer !== 1) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const col = Math.round((x - padding) / cellSize);
            const row = Math.round((y - padding) / cellSize);

            if (row >= 0 && row < size && col >= 0 && col < size && board[row][col] === 0) {
                makeMove(row, col, 1);
                // Simulando a IA enquanto não criamos o ai.js
                document.getElementById('status').innerText = "IA pensando...";
                setTimeout(() => {
                    simpleAIMove();
                }, 500);
            }
        });

        function makeMove(row, col, player) {
            board[row][col] = player;
            drawBoard();
            currentPlayer = (player === 1) ? 2 : 1;
        }

        function simpleAIMove() {
            // IA ultra simples apenas para teste visual
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    if(board[r][c] === 0) {
                        makeMove(r, c, 2);
                        document.getElementById('status').innerText = "Sua vez (Pretas)";
                        return;
                    }
                }
            }
        }

        function resetGame() {
            board = Array(size).fill().map(() => Array(size).fill(0));
            currentPlayer = 1;
            drawBoard();
        }

        function passTurn() {
            currentPlayer = 2;
            simpleAIMove();
        }

        // Inicializa o desenho pela primeira vez
        drawBoard();

    </script>
</body>
</html>
